<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja Armillas</title>
<style>
  :root {
    --primary: #d9480f;
    --primary-dark: #a83600;
    --accent: #2f9e44;
    --bg: #fdf6ee;
    --card: #ffffff;
    --border: #e8d9c5;
    --text: #2b2b2b;
    --muted: #7a7a7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    margin: 0 0 10px 0;
    font-size: 1.3rem;
    text-align: center;
  }
  nav {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .tab-btn {
    flex: 1;
    max-width: 200px;
    padding: 12px 8px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .tab-btn.active {
    background: white;
    color: var(--primary-dark);
  }
  main {
    padding: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ---- Vender ---- */
  .pos-layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  @media (min-width: 900px) {
    .pos-layout { flex-direction: row; align-items: flex-start; }
    .product-grid { flex: 2; }
    .cart-panel { flex: 1; position: sticky; top: 100px; }
  }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .product-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    font-size: 1rem;
  }
  .product-btn:active { background: #fff1e6; border-color: var(--primary); }
  .product-btn .name { font-weight: 600; text-align: center; }
  .product-btn .price { color: var(--primary-dark); font-weight: 700; }
  .empty-note { color: var(--muted); padding: 20px; text-align: center; }

  .cart-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .cart-panel h2 { margin-top: 0; font-size: 1.1rem; }
  .cart-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .cart-row .cart-name { flex: 1; font-weight: 600; }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #f4f4f4;
    font-size: 1.1rem;
    cursor: pointer;
  }
  .cart-subtotal { min-width: 70px; text-align: right; color: var(--muted); }
  .cart-total {
    font-size: 1.3rem;
    font-weight: 700;
    text-align: right;
    margin: 14px 0;
  }
  .pago-row {
    margin-top: 10px;
  }
  .pago-row label {
    display: block;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .pago-row input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1.3rem;
    text-align: right;
    font-weight: 700;
    background: white;
  }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .keypad button {
    padding: 16px 0;
    font-size: 1.3rem;
    font-weight: 700;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #f8f8f8;
    color: var(--text);
    cursor: pointer;
  }
  .keypad button:active { background: #e9e9e9; }
  .keypad .key-del { background: #ffe3e3; color: #c92a2a; }
  .cambio-row {
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    font-weight: 700;
    text-align: right;
    display: none;
  }
  .cambio-row.ok {
    display: block;
    background: #ebfbee;
    color: var(--accent);
  }
  .cambio-row.falta {
    display: block;
    background: #fff0f0;
    color: #c92a2a;
  }
  .btn-primary, .btn-secondary, .btn-danger {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: #eee; color: var(--text); }
  .btn-danger { background: #e03131; color: white; }

  /* ---- Productos ---- */
  #formProducto {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 12px;
  }
  #formProducto input {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
  }
  #inputNombre { flex: 2; min-width: 150px; }
  #inputPrecio { flex: 1; min-width: 100px; }
  #formProducto button {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 700;
    cursor: pointer;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  th { background: #f4e9dc; }
  td input {
    width: 100%;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .row-actions { display: flex; gap: 6px; }
  .icon-btn {
    border: none;
    background: #eee;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .icon-btn.delete { background: #ffe3e3; }
  .icon-btn.save { background: #d3f9d8; }

  /* ---- Historial ---- */
  .historial-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .historial-actions button {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-weight: 600;
  }
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
  }
  .day-header .date { font-weight: 700; }
  .day-header .total { color: var(--accent); font-weight: 700; }
  .day-detail {
    display: none;
    padding: 0 16px 14px 16px;
  }
  .day-detail.open { display: block; }
  .day-detail table { border: 1px solid var(--border); }
  .day-detail-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .day-detail-actions button {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #f4f4f4;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎉 CAJA ARMILLAS</h1>
    <nav>
      <button class="tab-btn active" data-tab="vender">Vender</button>
      <button class="tab-btn" data-tab="productos">Productos</button>
      <button class="tab-btn" data-tab="historial">Historial</button>
    </nav>
  </header>

  <main>
    <section id="tab-vender" class="tab-content active">
      <div class="pos-layout">
        <div class="product-grid" id="productGrid"></div>
        <div class="cart-panel">
          <h2>Ticket actual</h2>
          <div id="cartItems"></div>
          <div class="cart-total">Total: <span id="cartTotal">0,00 €</span></div>
          <div class="pago-row">
            <label for="inputEntregado">Efectivo entregado (€)</label>
            <input type="text" id="inputEntregado" inputmode="none" readonly autocomplete="off" placeholder="0,00">
            <div class="keypad" id="keypadEntregado">
              <button type="button" data-key="1">1</button>
              <button type="button" data-key="2">2</button>
              <button type="button" data-key="3">3</button>
              <button type="button" data-key="4">4</button>
              <button type="button" data-key="5">5</button>
              <button type="button" data-key="6">6</button>
              <button type="button" data-key="7">7</button>
              <button type="button" data-key="8">8</button>
              <button type="button" data-key="9">9</button>
              <button type="button" data-key=",">,</button>
              <button type="button" data-key="0">0</button>
              <button type="button" data-key="del" class="key-del">⌫</button>
            </div>
          </div>
          <div class="cambio-row" id="cambioRow"></div>
          <button id="btnCobrar" class="btn-primary" disabled>Cobrar</button>
          <button id="btnVaciar" class="btn-secondary">Vaciar ticket</button>
        </div>
      </div>
    </section>

    <section id="tab-productos" class="tab-content">
      <h2>Gestionar productos</h2>
      <form id="formProducto">
        <input id="inputNombre" placeholder="Nombre del producto" required>
        <input id="inputPrecio" type="number" step="0.01" min="0" placeholder="Precio €" required>
        <button type="submit">Añadir producto</button>
      </form>
      <table>
        <thead>
          <tr><th>Producto</th><th>Precio</th><th></th></tr>
        </thead>
        <tbody id="tablaProductosBody"></tbody>
      </table>
    </section>

    <section id="tab-historial" class="tab-content">
      <h2>Historial de días</h2>
      <div class="historial-actions">
        <button id="btnExportarTodo">⬇ Descargar backup completo (CSV)</button>
      </div>
      <div id="historialLista"></div>
    </section>
  </main>
</div>

<script>
(function () {
  "use strict";

  var LS_PRODUCTOS = "festa_productos";
  var LS_VENTAS = "festa_ventas";

  var cart = {}; // productId -> qty
  var currentTotal = 0;

  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function loadProductos() {
    try {
      return JSON.parse(localStorage.getItem(LS_PRODUCTOS)) || [];
    } catch (e) { return []; }
  }
  function saveProductos(list) {
    localStorage.setItem(LS_PRODUCTOS, JSON.stringify(list));
  }
  function loadVentas() {
    try {
      return JSON.parse(localStorage.getItem(LS_VENTAS)) || [];
    } catch (e) { return []; }
  }
  function saveVentas(list) {
    localStorage.setItem(LS_VENTAS, JSON.stringify(list));
  }

  function formatMoney(n) {
    return n.toLocaleString("es-ES", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
  }
  function todayStr() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return d.getFullYear() + "-" + m + "-" + day;
  }
  function timeStr() {
    var d = new Date();
    return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
  }

  // ---------- Tabs ----------
  document.querySelectorAll(".tab-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
      document.querySelectorAll(".tab-content").forEach(function (s) { s.classList.remove("active"); });
      btn.classList.add("active");
      document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      if (btn.dataset.tab === "productos") renderProductosTab();
      if (btn.dataset.tab === "historial") renderHistorial();
      if (btn.dataset.tab === "vender") renderProductGrid();
    });
  });

  // ---------- Vender: grid de productos ----------
  function renderProductGrid() {
    var productos = loadProductos();
    var grid = document.getElementById("productGrid");
    grid.innerHTML = "";
    if (productos.length === 0) {
      grid.innerHTML = '<div class="empty-note">No hay productos todavía.<br>Ve a la pestaña "Productos" para añadir alguno.</div>';
      return;
    }
    productos.forEach(function (p) {
      var btn = document.createElement("button");
      btn.className = "product-btn";
      btn.innerHTML = '<span class="name"></span><span class="price"></span>';
      btn.querySelector(".name").textContent = p.name;
      btn.querySelector(".price").textContent = formatMoney(p.price);
      btn.addEventListener("click", function () {
        cart[p.id] = (cart[p.id] || 0) + 1;
        renderCart();
      });
      grid.appendChild(btn);
    });
  }

  function renderCart() {
    var productos = loadProductos();
    var byId = {};
    productos.forEach(function (p) { byId[p.id] = p; });

    var container = document.getElementById("cartItems");
    container.innerHTML = "";
    var total = 0;
    var hasItems = false;

    Object.keys(cart).forEach(function (pid) {
      var qty = cart[pid];
      if (qty <= 0) return;
      var p = byId[pid];
      if (!p) return;
      hasItems = true;
      var subtotal = p.price * qty;
      total += subtotal;

      var row = document.createElement("div");
      row.className = "cart-row";
      row.innerHTML =
        '<span class="cart-name"></span>' +
        '<div class="qty-controls">' +
          '<button class="qty-btn" data-action="dec">−</button>' +
          '<span class="qty-val"></span>' +
          '<button class="qty-btn" data-action="inc">+</button>' +
        '</div>' +
        '<span class="cart-subtotal"></span>';
      row.querySelector(".cart-name").textContent = p.name;
      row.querySelector(".qty-val").textContent = qty;
      row.querySelector(".cart-subtotal").textContent = formatMoney(subtotal);
      row.querySelector('[data-action="inc"]').addEventListener("click", function () {
        cart[pid]++;
        renderCart();
      });
      row.querySelector('[data-action="dec"]').addEventListener("click", function () {
        cart[pid]--;
        if (cart[pid] <= 0) delete cart[pid];
        renderCart();
      });
      container.appendChild(row);
    });

    if (!hasItems) {
      container.innerHTML = '<div class="empty-note">Toca un producto para añadirlo al ticket.</div>';
    }

    currentTotal = total;
    document.getElementById("cartTotal").textContent = formatMoney(total);
    document.getElementById("btnCobrar").disabled = !hasItems;
    updateCambio();
  }

  function updateCambio() {
    var row = document.getElementById("cambioRow");
    var entregadoRaw = document.getElementById("inputEntregado").value;
    var entregado = parseFloat(entregadoRaw.replace(",", "."));

    if (entregadoRaw === "" || isNaN(entregado)) {
      row.className = "cambio-row";
      row.textContent = "";
      return;
    }

    var diff = entregado - currentTotal;
    if (diff >= 0) {
      row.className = "cambio-row ok";
      row.textContent = "Cambio a devolver: " + formatMoney(diff);
    } else {
      row.className = "cambio-row falta";
      row.textContent = "Falta por cobrar: " + formatMoney(-diff);
    }
  }

  document.getElementById("inputEntregado").addEventListener("input", updateCambio);

  document.getElementById("keypadEntregado").querySelectorAll("button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var input = document.getElementById("inputEntregado");
      var key = btn.dataset.key;
      if (key === "del") {
        input.value = input.value.slice(0, -1);
      } else if (key === ",") {
        if (input.value.indexOf(",") === -1) input.value += ",";
      } else {
        var parts = input.value.split(",");
        if (parts[1] && parts[1].length >= 2) return;
        input.value += key;
      }
      updateCambio();
    });
  });

  document.getElementById("btnVaciar").addEventListener("click", function () {
    cart = {};
    document.getElementById("inputEntregado").value = "";
    renderCart();
  });

  document.getElementById("btnCobrar").addEventListener("click", function () {
    var productos = loadProductos();
    var byId = {};
    productos.forEach(function (p) { byId[p.id] = p; });

    var items = [];
    var total = 0;
    Object.keys(cart).forEach(function (pid) {
      var qty = cart[pid];
      var p = byId[pid];
      if (!p || qty <= 0) return;
      items.push({ productId: pid, name: p.name, price: p.price, qty: qty });
      total += p.price * qty;
    });
    if (items.length === 0) return;

    var ventas = loadVentas();
    ventas.push({
      id: uid(),
      date: todayStr(),
      time: timeStr(),
      items: items,
      total: total
    });
    saveVentas(ventas);

    cart = {};
    document.getElementById("inputEntregado").value = "";
    renderCart();
  });

  // ---------- Productos: gestión ----------
  function renderProductosTab() {
    var productos = loadProductos();
    var tbody = document.getElementById("tablaProductosBody");
    tbody.innerHTML = "";
    if (productos.length === 0) {
      var tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="3" class="empty-note">Añade tu primer producto arriba.</td>';
      tbody.appendChild(tr);
      return;
    }
    productos.forEach(function (p) {
      var tr = document.createElement("tr");
      tr.innerHTML =
        '<td><input class="edit-name" value=""></td>' +
        '<td><input class="edit-price" type="number" step="0.01" min="0" value=""></td>' +
        '<td class="row-actions">' +
          '<button class="icon-btn save">Guardar</button>' +
          '<button class="icon-btn delete">Eliminar</button>' +
        '</td>';
      tr.querySelector(".edit-name").value = p.name;
      tr.querySelector(".edit-price").value = p.price;

      tr.querySelector(".save").addEventListener("click", function () {
        var newName = tr.querySelector(".edit-name").value.trim();
        var newPrice = parseFloat(tr.querySelector(".edit-price").value);
        if (!newName || isNaN(newPrice) || newPrice < 0) {
          alert("Revisa el nombre y el precio.");
          return;
        }
        var list = loadProductos();
        var item = list.find(function (x) { return x.id === p.id; });
        item.name = newName;
        item.price = newPrice;
        saveProductos(list);
        renderProductosTab();
      });

      tr.querySelector(".delete").addEventListener("click", function () {
        if (!confirm('¿Eliminar "' + p.name + '"? Esto no borra las ventas ya registradas.')) return;
        var list = loadProductos().filter(function (x) { return x.id !== p.id; });
        saveProductos(list);
        renderProductosTab();
      });

      tbody.appendChild(tr);
    });
  }

  document.getElementById("formProducto").addEventListener("submit", function (e) {
    e.preventDefault();
    var nombre = document.getElementById("inputNombre").value.trim();
    var precio = parseFloat(document.getElementById("inputPrecio").value);
    if (!nombre || isNaN(precio) || precio < 0) return;

    var list = loadProductos();
    list.push({ id: uid(), name: nombre, price: precio });
    saveProductos(list);

    document.getElementById("inputNombre").value = "";
    document.getElementById("inputPrecio").value = "";
    document.getElementById("inputNombre").focus();
    renderProductosTab();
  });

  // ---------- Historial ----------
  function groupByDay(ventas) {
    var days = {};
    ventas.forEach(function (v) {
      if (!days[v.date]) days[v.date] = { date: v.date, total: 0, ventas: [], porProducto: {} };
      var day = days[v.date];
      day.total += v.total;
      day.ventas.push(v);
      v.items.forEach(function (it) {
        if (!day.porProducto[it.name]) day.porProducto[it.name] = { qty: 0, total: 0 };
        day.porProducto[it.name].qty += it.qty;
        day.porProducto[it.name].total += it.price * it.qty;
      });
    });
    return Object.keys(days).sort().reverse().map(function (k) { return days[k]; });
  }

  function downloadCSV(filename, rows) {
    var csv = rows.map(function (row) {
      return row.map(function (cell) {
        var s = String(cell).replace(/"/g, '""');
        return '"' + s + '"';
      }).join(";");
    }).join("\r\n");
    var blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportarDia(day) {
    var rows = [["Fecha", "Producto", "Unidades", "Total (€)"]];
    Object.keys(day.porProducto).forEach(function (name) {
      var d = day.porProducto[name];
      rows.push([day.date, name, d.qty, d.total.toFixed(2)]);
    });
    rows.push(["", "", "TOTAL DÍA", day.total.toFixed(2)]);
    downloadCSV("ventas_" + day.date + ".csv", rows);
  }

  function exportarTodo() {
    var ventas = loadVentas();
    var rows = [["Fecha", "Hora", "Producto", "Unidades", "Precio unidad (€)", "Subtotal (€)"]];
    ventas.forEach(function (v) {
      v.items.forEach(function (it) {
        rows.push([v.date, v.time, it.name, it.qty, it.price.toFixed(2), (it.price * it.qty).toFixed(2)]);
      });
    });
    downloadCSV("backup_fiestas_" + todayStr() + ".csv", rows);
  }

  document.getElementById("btnExportarTodo").addEventListener("click", exportarTodo);

  function renderHistorial() {
    var ventas = loadVentas();
    var dias = groupByDay(ventas);
    var container = document.getElementById("historialLista");
    container.innerHTML = "";

    if (dias.length === 0) {
      container.innerHTML = '<div class="empty-note">Todavía no se ha cobrado ninguna venta.</div>';
      return;
    }

    dias.forEach(function (day) {
      var card = document.createElement("div");
      card.className = "day-card";

      var header = document.createElement("div");
      header.className = "day-header";
      header.innerHTML =
        '<span class="date"></span>' +
        '<span class="total"></span>';
      header.querySelector(".date").textContent = day.date;
      header.querySelector(".total").textContent = formatMoney(day.total);

      var detail = document.createElement("div");
      detail.className = "day-detail";

      var table = document.createElement("table");
      var thead = "<thead><tr><th>Producto</th><th>Unidades</th><th>Total</th></tr></thead>";
      var tbodyRows = Object.keys(day.porProducto).map(function (name) {
        var d = day.porProducto[name];
        return "<tr><td>" + name + "</td><td>" + d.qty + "</td><td>" + formatMoney(d.total) + "</td></tr>";
      }).join("");
      table.innerHTML = thead + "<tbody>" + tbodyRows + "</tbody>";
      detail.appendChild(table);

      var actions = document.createElement("div");
      actions.className = "day-detail-actions";
      var btnExport = document.createElement("button");
      btnExport.textContent = "⬇ Exportar este día (CSV)";
      btnExport.addEventListener("click", function (e) {
        e.stopPropagation();
        exportarDia(day);
      });
      actions.appendChild(btnExport);
      detail.appendChild(actions);

      header.addEventListener("click", function () {
        detail.classList.toggle("open");
      });

      card.appendChild(header);
      card.appendChild(detail);
      container.appendChild(card);
    });
  }

  // ---------- Init ----------
  renderProductGrid();
  renderCart();
})();
</script>
</body>
</html>
